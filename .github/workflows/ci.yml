name: Build and Push to Docker Hub

# Trigger workflow on pushes to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Sets up Docker Buildx to allow optimized multi-platform builds if needed
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with the user's username and 'mlops-api:latest'
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-api:latest
          # Helps speed up subsequent builds by using GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
